name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="v${{ github.event.inputs.version }}"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          body: |
            ## MyMovie v${{ github.event.inputs.version }}

            Full-stack movie ticket booking platform.

            ### Highlights
            - Spring Boot 3 backend with SQLite persistence
            - React 18 SPA with React Bootstrap UI
            - JWT authentication with refresh-token rotation
            - Stripe-powered card payments
            - Admin dashboard with full CRUD for movies, theatres, screens, and shows
            - Seat validation and booking management

            ### Running the project
            See [README.md](https://github.com/${{ github.repository }}/blob/main/README.md) for setup instructions.
          draft: false
          prerelease: ${{ github.event.inputs.prerelease }}
          make_latest: true
          generate_release_notes: true
